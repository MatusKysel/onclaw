apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: onclaw
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.anthropicApiKey | quote }}
  {{- if .Values.slackAppToken }}
  SLACK_APP_TOKEN: {{ .Values.slackAppToken | quote }}
  {{- end }}
  {{- if .Values.slackBotToken }}
  SLACK_BOT_TOKEN: {{ .Values.slackBotToken | quote }}
  {{- end }}
  {{- if .Values.telegramBotToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.telegramBotToken | quote }}
  {{- end }}
