apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: onclaw
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: onclaw
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: onclaw
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: onclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}
          env:
            - name: CLAUDE_MODEL
              value: {{ .Values.claudeModel | quote }}
            - name: CLAUDE_MAX_TOKENS
              value: {{ .Values.claudeMaxTokens | quote }}
            - name: MAX_LOG_LINES
              value: {{ .Values.maxLogLines | quote }}
            - name: MAX_CONCURRENT_INVESTIGATIONS
              value: {{ .Values.maxConcurrentInvestigations | quote }}
            - name: ONCLAW_MEMORY_PATH
              value: /data/onclaw_memory.db
            {{- if .Values.kubeconfig.enabled }}
            - name: KUBECONFIG
              value: /etc/onclaw/kubeconfig
            {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: memory
              mountPath: /data
            {{- end }}
            {{- if .Values.kubeconfig.enabled }}
            - name: kubeconfig
              mountPath: /etc/onclaw
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: memory
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-memory
        {{- end }}
        {{- if .Values.kubeconfig.enabled }}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubeconfig.secretName }}
            items:
              - key: {{ .Values.kubeconfig.key }}
                path: kubeconfig
        {{- end }}
